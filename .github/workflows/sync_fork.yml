name: Fork Sync and Sync to Hugging Face Space

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00 执行
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest

    # 只在 fork 仓库，并且不是 push 事件时执行
    # push 到 main 时不需要再同步 upstream
    if: ${{ github.event.repository.fork && github.event_name != 'push' }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: huangxd-/danmu_api
          upstream_sync_branch: main
          target_sync_branch: main
          test_mode: false

      - name: Check for new commits
        if: success()
        run: echo "Sync completed successfully"

      - name: Check for Failure
        if: failure()
        run: |
          echo "[Error] Sync failed. This might be due to:"
          echo "1. Changes in the upstream workflow file"
          echo "2. Merge conflicts that need manual resolution"
          echo "3. Network issues"
          echo "Please check the logs and consider manual sync if needed."
          exit 1

  sync_to_huggingface:
    name: Sync to Hugging Face Space
    runs-on: ubuntu-latest
    needs: sync_with_upstream

    # 执行条件：
    # 1. push 到 main 时执行
    # 2. 手动触发或定时触发时，如果 upstream 同步成功，则执行
    # 3. 如果不是 fork，sync_with_upstream 会被跳过，手动触发时也允许执行 HF 同步
    if: |
      always() &&
      (
        github.event_name == 'push' ||
        needs.sync_with_upstream.result == 'success' ||
        (
          github.event_name == 'workflow_dispatch' &&
          needs.sync_with_upstream.result == 'skipped'
        )
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          ref: main

      - name: Prepare Hugging Face README
        run: |
          if [ -f README.hf.md ]; then
            cp README.hf.md README.md
          else
            echo "README.hf.md not found, using existing README.md"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "准备 Hugging Face Space 元数据" --allow-empty

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
        run: |
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git push --force hf HEAD:main
